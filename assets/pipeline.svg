<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="SMARTCyp workflow: SMILES input runs in a locked-down container and writes ranked results to the out directory">
  <defs>
    <linearGradient id="rank2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ecc71"/>
      <stop offset="0.5" stop-color="#f1c40f"/>
      <stop offset="1" stop-color="#e67e22"/>
    </linearGradient>
    <style>
      .card  { fill: #ffffff; stroke: #d3dde0; stroke-width: 2; }
      .panel { fill: #f3f7f8; stroke: #cdd9dc; stroke-width: 2; }
      .h     { font: 700 22px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0e3a3f; }
      .s     { font: 400 16px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #4a5d61; }
      .mono  { font: 600 15px 'SFMono-Regular', Consolas, monospace; fill: #10565a; }
      .lbl   { font: 700 13px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #0b2027; }
      .bond  { stroke: #4a5d61; stroke-width: 2.5; fill: none; }
      .arrow { fill: none; stroke: #10565a; stroke-width: 3; }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#10565a"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="transparent"/>

  <!-- Stage 1: input -->
  <rect x="30" y="120" width="270" height="120" rx="12" class="card"/>
  <text x="165" y="160" text-anchor="middle" class="h">1 · Input</text>
  <text x="165" y="188" text-anchor="middle" class="s">A molecule as a SMILES string</text>
  <rect x="55" y="200" width="220" height="26" rx="6" fill="#0e3a3f"/>
  <text x="68" y="218" class="mono" fill="#b8e0db">CN1C=NC2=C1C(=O)N...</text>

  <!-- arrow -->
  <line x1="305" y1="180" x2="395" y2="180" class="arrow" marker-end="url(#ah)"/>

  <!-- Stage 2: container -->
  <rect x="400" y="70" width="380" height="220" rx="12" class="panel"/>
  <text x="590" y="108" text-anchor="middle" class="h">2 · Locked-down container</text>

  <!-- shield -->
  <g transform="translate(430,135)">
    <path d="M30,0 L60,12 L60,45 C60,68 46,82 30,90 C14,82 0,68 0,45 L0,12 Z" fill="#10565a"/>
    <path d="M16,44 L26,56 L46,30" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(505,140)">
    <text x="0" y="6"  class="lbl">no network</text>
    <text x="0" y="30" class="lbl">read-only filesystem</text>
    <text x="0" y="54" class="lbl">all capabilities dropped</text>
    <text x="0" y="78" class="lbl">no privilege escalation</text>
    <text x="0" y="102" class="lbl">runs as your user</text>
  </g>

  <!-- arrow -->
  <line x1="785" y1="180" x2="875" y2="180" class="arrow" marker-end="url(#ah)"/>

  <!-- Stage 3: output -->
  <rect x="880" y="70" width="290" height="220" rx="12" class="card"/>
  <text x="1025" y="108" text-anchor="middle" class="h">3 · ./out</text>
  <text x="1025" y="132" text-anchor="middle" class="s">Ranked sites + figures</text>

  <!-- mini molecule with ranked sites -->
  <g transform="translate(930,165)" class="bond">
    <polygon points="0,-26 22,-13 22,13 0,26 -22,13 -22,-13"/>
    <line x1="22" y1="-13" x2="44" y2="-26"/>
  </g>
  <circle cx="908" cy="152" r="13" fill="url(#rank2)"/>
  <text x="908" y="157" text-anchor="middle" class="lbl" fill="#0b2027">1</text>
  <circle cx="974" cy="139" r="11" fill="#f1c40f"/>
  <text x="974" y="143" text-anchor="middle" class="lbl" fill="#0b2027">2</text>

  <!-- results table -->
  <rect x="1000" y="150" width="150" height="110" rx="6" class="panel"/>
  <line x1="1000" y1="176" x2="1150" y2="176" stroke="#cdd9dc" stroke-width="2"/>
  <text x="1012" y="169" class="lbl">Rank  Atom  Score</text>
  <text x="1012" y="196" class="mono" font-size="13">1     C.7    52.1</text>
  <text x="1012" y="218" class="mono" font-size="13">2     N.3    61.4</text>
  <text x="1012" y="240" class="mono" font-size="13">3     C.2    78.0</text>
</svg>
